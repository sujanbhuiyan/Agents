name: validate

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Validate agent frontmatter
        run: npm run validate
      - name: Verify generated catalog is up to date
        run: |
          npm run build
          if [ -n "$(git status --porcelain)" ]; then
            echo "::error::Generated files are stale. Run 'npm run build' and commit the result."
            git --no-pager diff --stat
            exit 1
          fi
